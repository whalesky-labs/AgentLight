name: Firmware CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "可选固件版本号，例如 v1.0.0"
        required: false
        type: string
      build_channel:
        description: "固件构建通道"
        required: false
        default: 预览构建
        type: choice
        options:
          - 正式构建
          - 预览构建
      publish_release:
        description: "是否创建 GitHub Release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  firmware:
    name: Build ESP32-C3 firmware
    runs-on: ubuntu-latest

    env:
      PLATFORMIO_ENV: esp32-c3-supermini

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: python -m pip install --upgrade -r requirements.txt

      - name: Prepare firmware release metadata
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          INPUT_BUILD_CHANNEL: ${{ inputs.build_channel }}
        run: |
          scripts/ci/prepare-firmware-release > release.env
          cat release.env
          cat release.env >> "$GITHUB_OUTPUT"
          grep '^version=' release.env | sed 's/^version=/FIRMWARE_VERSION=/' >> "$GITHUB_ENV"

      - name: Verify firmware CI scripts
        run: scripts/ci/verify-firmware-ci

      - name: Build firmware
        run: pio run -e "$PLATFORMIO_ENV"

      - name: Verify bridge scripts
        run: scripts/verify-agent-bridge

      - name: Package firmware
        run: |
          scripts/ci/package-firmware \
            --version "$FIRMWARE_VERSION" \
            --environment "$PLATFORMIO_ENV" \
            --build-channel "${{ steps.release.outputs.build_channel }}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v5
        with:
          name: agentlight-firmware-${{ steps.release.outputs.version }}
          path: |
            dist/firmware.bin
            dist/bootloader.bin
            dist/partitions.bin
            dist/manifest.json
            dist/firmware-release-notes.md
            dist/firmware-assets.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.release.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.release_name }}
          prerelease: ${{ steps.release.outputs.is_prerelease }}
          body_path: dist/firmware-release-notes.md
          files: |
            dist/firmware.bin
            dist/bootloader.bin
            dist/partitions.bin
            dist/manifest.json
            dist/firmware-release-notes.md
            dist/firmware-assets.sha256
          fail_on_unmatched_files: true
