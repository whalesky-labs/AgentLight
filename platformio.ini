[platformio]
default_envs = esp32-c3-supermini

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = huge_app.csv

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D AGENTLIGHT_PIN_RED=4
  -D AGENTLIGHT_PIN_YELLOW=5
  -D AGENTLIGHT_PIN_GREEN=6
  -D AGENTLIGHT_ACTIVE_LOW=0
  -D AGENTLIGHT_WIFI_AP_SSID=\"WHALESKY-LABS-AGENTLIGHT\"
  -D AGENTLIGHT_WIFI_AP_PASSWORD=\"agentlight\"
  -D AGENTLIGHT_BLE_DEVICE_NAME=\"WHALESKY-LABS-AGENTLIGHT\"
  -D AGENTLIGHT_BLE_ADVERTISED_NAME=\"AGENTLIGHT\"
  -D AGENTLIGHT_BLE_SERVICE_UUID=\"8f16d7a0-6c6d-4d68-8d64-6b4d2a86b601\"
  -D AGENTLIGHT_BLE_RX_UUID=\"8f16d7a1-6c6d-4d68-8d64-6b4d2a86b601\"
  -D AGENTLIGHT_BLE_TX_UUID=\"8f16d7a2-6c6d-4d68-8d64-6b4d2a86b601\"
  -D AGENTLIGHT_BLE_APPEARANCE=0x03C1
  -D AGENTLIGHT_BLE_ENABLE_HID_PAIRING_SHELL=1
  -D AGENTLIGHT_BLE_MANUFACTURER_NAME=\"whalesky-labs\"
  -D AGENTLIGHT_BLE_MODEL_NUMBER=\"AgentLight-ESP32-C3\"
  -D AGENTLIGHT_BLE_BATTERY_LEVEL=100
  -D AGENTLIGHT_BLE_VENDOR_ID=0x1209
  -D AGENTLIGHT_BLE_PRODUCT_ID=0xA11E
  -D AGENTLIGHT_BLE_PRODUCT_VERSION=0x0100
  -D AGENTLIGHT_BLE_REQUIRE_PAIRING=1
  -D AGENTLIGHT_BLE_PAIRING_PIN=521000
